<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbanPulse — You're offline</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        margin: 0;
        background: #09090b;
        color: #fafafa;
        text-align: center;
        padding: 2rem;
      }
      h1   { font-size: 1.5rem; font-weight: 700; margin: 0 0 .5rem; }
      p    { color: #a1a1aa; margin: 0 0 1.5rem; max-width: 22rem; line-height: 1.6; }
      button {
        background: #e5e5e5;
        color: #09090b;
        border: none;
        border-radius: .5rem;
        padding: .625rem 1.5rem;
        font-size: .875rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #fff; }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Your cart and wishlist will sync when you're back online.</p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
