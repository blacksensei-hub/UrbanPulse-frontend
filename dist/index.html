    <!-- No-FOUC: applies stored theme BEFORE React mounts, falling back to the OS
         preference when no theme has been chosen yet (not hardcoded to light). Also
         marks splash start time and arms a failsafe in case React never mounts. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('urbanpulse-theme');
          var t = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (t === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = t;
        } catch (e) {}

        window.__splashStart = Date.now();
        window.__splashTimeoutId = setTimeout(function () {
          var splash = document.getElementById('splash');
          if (!splash) return;
          var msg = document.createElement('p');
          msg.className = 'sp-failsafe';
          msg.innerHTML = 'Taking longer than usual. <a href="">Refresh</a>.';
          splash.appendChild(msg);
        }, 10000);
      })();
    </script>
    <style>
      #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#F8F6F2;z-index:9999;pointer-events:none;opacity:1;transition:opacity .25s ease;}
      html.dark #splash{background:#12100E;}

      .sp-wm{display:flex;font-family:'Clash Display',ui-sans-serif,sans-serif;font-size:clamp(2rem,8vw,3.5rem);font-weight:700;letter-spacing:-0.03em;animation:sp-pulse 2s ease-in-out .75s infinite;}

      .sp-l{color:#1A1A1A;opacity:0;animation:sp-up .4s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*35ms);}
      html.dark .sp-l{color:#F2EFE8;}
      .sp-a{color:#D85A30;opacity:0;animation:sp-up .4s cubic-bezier(.16,1,.3,1) forwards;animation-delay:calc(var(--i)*35ms);}
      html.dark .sp-a{color:#E87A4F;}
      .sp-failsafe{pointer-events:auto;font-family:ui-sans-serif,sans-serif;font-size:0.875rem;color:#6B6B66;}
      .sp-failsafe a{color:#D85A30;text-decoration:underline;}
      html.dark .sp-failsafe a{color:#E87A4F;}
      @media(prefers-reduced-motion:reduce){.sp-l,.sp-a{opacity:1;animation:none;}.sp-wm{animation:none;}#splash{transition:none;}}
    </style>
